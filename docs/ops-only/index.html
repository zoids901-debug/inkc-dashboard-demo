<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>데모커피 운영 대시보드 · DEMO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;color:#1E293B;font-size:13px}

/* ── 헤더 ── */
.hdr{background:#1E293B;padding:0 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;min-height:48px;position:sticky;top:0;z-index:200}
.hdr-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:-.3px}
.hdr-title em{color:#F59E0B;font-style:normal}
.sep{width:1px;height:20px;background:#334155;flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── 컨트롤 바 (날짜 + 매장) ── */
.ctrl-bar{background:#fff;border-bottom:1px solid #E2E8F0;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:48px;z-index:190;box-shadow:0 1px 3px rgba(0,0,0,.05)}

/* 프리셋 버튼 */
.presets{display:flex;gap:5px}
.preset-btn{border:1px solid #CBD5E1;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;color:#64748B;background:#fff;cursor:pointer;transition:.15s;white-space:nowrap}
.preset-btn:hover{border-color:#3B82F6;color:#3B82F6}
.preset-btn.active{background:#3B82F6;border-color:#3B82F6;color:#fff}

/* 날짜 범위 선택 */
.date-range{display:flex;align-items:center;gap:8px;background:#F8FAFC;border:1.5px solid #CBD5E1;border-radius:8px;padding:5px 12px;cursor:pointer}
.date-range .dr-label{font-size:11px;font-weight:700;color:#64748B;white-space:nowrap}
.date-range .dr-sep{color:#94A3B8;font-weight:700}
#dateRangeInput{border:none;background:transparent;font-size:13px;font-weight:600;color:#1E293B;cursor:pointer;padding:0 4px;width:200px;text-align:center}
#dateRangeInput:focus{outline:none}
.litepicker{--color-primary-btn:#3B82F6;--color-hover:#DBEAFE;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
.litepicker .container__months{box-shadow:0 4px 20px rgba(0,0,0,.12);border-radius:12px;background:#fff}
.litepicker .month-item-header button{color:#3B82F6}
.litepicker .day-item.is-start-date,.litepicker .day-item.is-end-date{background:#3B82F6!important;color:#fff!important;border-radius:50%}
.litepicker .day-item.is-in-range{background:#DBEAFE!important;color:#1E293B!important}
.ctrl-sep{width:1px;height:24px;background:#E2E8F0;flex-shrink:0}

/* 매장 필터 */
.store-pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.pills-label{font-size:11px;font-weight:700;color:#94A3B8;white-space:nowrap}
.pill{border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:.15s;opacity:.35;white-space:nowrap}
.pill.on{opacity:1}

/* ── 본문 ── */
.main{max-width:1440px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}

/* 카드 */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:18px 20px}
.card-title{font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* ── 페이스 카드 ── */
.pace-card{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:#E2E8F0;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.pace-item{background:#fff;padding:16px 20px}
.pace-item .lbl{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.pace-item .val{font-size:24px;font-weight:800;color:#1E293B;line-height:1}
.pace-item .sub{font-size:11px;color:#94A3B8;margin-top:5px}
.pace-item .progress{height:5px;background:#E2E8F0;border-radius:3px;margin-top:10px;overflow:hidden}
.pace-item .progress-fill{height:100%;border-radius:3px;transition:width .4s}
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:10px;padding:2px 7px;margin-left:6px;vertical-align:middle}
.badge.up{background:#DCFCE7;color:#15803D}
.badge.down{background:#FEE2E2;color:#B91C1C}
.badge.neutral{background:#F1F5F9;color:#64748B}

/* ── 2단 레이아웃 ── */
.row2{display:grid;grid-template-columns:1fr 340px;gap:14px}
.row2b{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:960px){.row2,.row2b{grid-template-columns:1fr}}
@media(max-width:900px){
  .hdr{padding:0 12px;min-height:42px;gap:10px}
  .hdr-title{font-size:13px}
  .ctrl-bar{top:42px;padding:7px 12px;gap:10px;font-size:11px}
  .preset-btn{padding:4px 9px;font-size:11px}
  .date-range{padding:4px 9px;gap:5px}
  #dateRangeInput{width:150px;font-size:12px}
  .date-range .dr-label{font-size:10px}
  .pills-label{font-size:10px}
  .pill{padding:3px 10px;font-size:10.5px}
  .main{padding:12px 10px;gap:10px}
  .card{padding:13px 13px}
  .card-title{font-size:11px;margin-bottom:10px}
  .pace-card{grid-template-columns:repeat(2,1fr)}
  .pace-item{padding:12px 14px}
  .pace-item .val{font-size:19px}
  .pace-item .lbl{font-size:10px}
  .pace-item .sub{font-size:10px}
  .row2,.row2b{grid-template-columns:1fr}
  .h220{height:180px}
  .h240{height:200px}
  .h200{height:170px}
  .donut-canvas-wrap{width:150px;height:150px}
  .dt-table{font-size:11px}
  .dt-table thead tr:last-child th{top:25px}
  .dt-scroll{max-height:55vh}
  .dt-date,.dt-td,.dt-dow{padding:4px 5px}
  .rank-table th,.rank-table td{padding:6px 6px;font-size:11px}
}
@media(max-width:480px){
  .hdr{padding:0 10px;min-height:40px}
  .hdr-title{font-size:12px}
  .ctrl-bar{top:40px;padding:6px 10px;gap:8px}
  .preset-btn{padding:3px 7px;font-size:10px}
  .date-range{padding:3px 7px}
  #dateRangeInput{width:120px;font-size:11px}
  .ctrl-sep{display:none}
  .pill{padding:2px 8px;font-size:10px}
  .main{padding:8px 6px;gap:8px}
  .card{padding:10px 10px}
  .pace-card{grid-template-columns:repeat(2,1fr)}
  .pace-item{padding:10px 10px}
  .pace-item .val{font-size:17px}
  .h220{height:160px}
  .h240{height:180px}
  .h200{height:150px}
  .donut-canvas-wrap{width:130px;height:130px}
  .dt-table{font-size:10.5px}
  .dt-table thead tr:last-child th{top:23px}
  .dt-scroll{max-height:50vh}
}
.dt-scroll{overflow:auto;max-height:60vh}
.dt-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.dt-table thead tr:first-child th{background:#F8FAFC;font-weight:700;padding:6px 8px;border-bottom:2px solid #E2E8F0;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:50}
.dt-table thead tr:last-child th{background:#F8FAFC;font-weight:500;color:#64748B;padding:3px 6px;border-bottom:1px solid #E2E8F0;text-align:center;font-size:11px;position:sticky;top:29px;z-index:49}
.dt-th{white-space:nowrap}
.dt-sub{white-space:nowrap}
.dt-table tbody tr:hover{background:#F0F9FF}
.dt-table tfoot td{background:#F1F5F9;font-weight:700;border-top:2px solid #CBD5E1}
.dt-date{padding:5px 8px;color:#374151;font-weight:600;white-space:nowrap;text-align:center}
.dt-dow{padding:5px 4px;color:#6B7280;text-align:center;font-size:11px}
.dt-td{padding:5px 8px;text-align:right;color:#1E293B;border-bottom:1px solid #F1F5F9}
.dt-sum{font-weight:600;background:#F8FAFC}
.dt-total{font-weight:700;color:#1E293B}
.dt-wknd .dt-date,.dt-wknd .dt-dow{color:#EF4444}
.dt-wknd td{background:#FFF5F5}
.dt-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 6px;padding:6px 10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:11px}
.dt-ctrl-label{font-weight:700;color:#475569;margin-right:2px}
.dt-mode-btn{padding:3px 10px;border:1px solid #CBD5E1;background:#fff;border-radius:4px;cursor:pointer;font-size:11px;color:#475569}
.dt-mode-btn.active{background:#0EA5E9;color:#fff;border-color:#0EA5E9}
.dt-heat-btn{padding:3px 10px;border:1px solid #CBD5E1;background:#fff;border-radius:4px;cursor:pointer;font-size:11px;color:#475569}
.dt-heat-btn.on{background:#0EA5E9;color:#fff;border-color:#0EA5E9}
.dt-store-chips{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.dt-store-chip{padding:3px 9px;border:1px solid #CBD5E1;background:#fff;border-radius:12px;cursor:pointer;font-size:11px;font-weight:600}
.dt-store-chip.off{background:#F1F5F9;color:#94A3B8;text-decoration:line-through;border-color:#E2E8F0}
.dt-table .dt-th{cursor:pointer;user-select:none}
.dt-table .dt-th:hover{background:#E2E8F0!important}

/* ── 순위 테이블 ── */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.3px;padding:6px 10px;text-align:right;border-bottom:2px solid #F1F5F9;white-space:nowrap}
.rank-table th:first-child,.rank-table th:nth-child(2){text-align:left}
.rank-table td{padding:9px 10px;border-bottom:1px solid #F8FAFC;text-align:right;font-size:12px}
.rank-table td:first-child{text-align:center;font-size:11px;font-weight:700;color:#94A3B8;width:28px}
.rank-table td:nth-child(2){text-align:left;font-weight:700}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:#F8FAFC}
.store-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.delta{font-size:10px;margin-left:3px}
.delta.up{color:#15803D}
.delta.dn{color:#DC2626}
.ach-chip{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}
.ach-g{background:#DCFCE7;color:#15803D}
.ach-y{background:#FEF9C3;color:#92400E}
.ach-r{background:#FEE2E2;color:#B91C1C}
.ach-wrap{display:flex;align-items:center;gap:6px}
.ach-bar{flex:1;min-width:36px;height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.ach-fill{height:100%;border-radius:3px;transition:width .4s}
.ach-fill.ach-g{background:#22C55E}
.ach-fill.ach-y{background:#EAB308}
.ach-fill.ach-r{background:#EF4444}
.warn-flag{display:inline-block;margin-left:4px;color:#D97706;cursor:help;font-size:11px;font-weight:700;vertical-align:middle}
.tmode-wrap{display:inline-flex;border:1px solid #CBD5E1;border-radius:6px;overflow:hidden}
.tmode-btn{padding:3px 9px;background:#fff;color:#64748B;border:none;cursor:pointer;font-weight:600;font-size:11px;white-space:nowrap}
.tmode-btn.active{background:#3B82F6;color:#fff}
.tmode-btn+.tmode-btn{border-left:1px solid #CBD5E1}
.range-note{font-size:10px;color:#94A3B8;font-weight:600;margin-left:4px}

/* ── 차트 ── */
.chart-wrap{position:relative}
.h220{height:220px}
.h240{height:240px}
.h200{height:200px}

/* ── 도넛 ── */
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:100%;padding-top:4px}
.donut-canvas-wrap{position:relative;width:180px;height:180px}
.donut-legend{display:flex;flex-direction:column;gap:5px;width:100%}
.dl-item{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:6px}
.dl-name{font-weight:600;color:#1E293B;flex:1}
.dl-pct{font-weight:700;color:#475569}

/* ── YoY 범례 ── */
.chart-legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748B}
.cl-line{width:20px;height:2px;border-radius:1px}
.cl-dashed{border-top:2px dashed #94A3B8;width:20px;height:0}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">데모<em>커피</em> 운영 대시보드</div>
</div>

<!-- 컨트롤 바 -->
<div class="ctrl-bar">
  <!-- 프리셋 -->
  <div class="presets" id="presets">
    <button class="preset-btn" data-p="yesterday">어제</button>
    <button class="preset-btn" data-p="week">이번 주</button>
    <button class="preset-btn active" data-p="mtd">이번 달</button>
    <button class="preset-btn" data-p="last_month">지난 달</button>
    <button class="preset-btn" data-p="this_year">올해</button>
    <button class="preset-btn" data-p="last_year">작년</button>
  </div>

  <div class="ctrl-sep"></div>

  <!-- 날짜 범위 선택 -->
  <div class="date-range">
    <span class="dr-label">📅</span>
    <input type="text" id="dateRangeInput" placeholder="날짜 범위 선택" readonly>
  </div>

  <div class="ctrl-sep"></div>

  <!-- 매장 필터 -->
  <span class="pills-label">매장</span>
  <div class="store-pills" id="storePills">
    <button class="pill on" id="pillAll">전체</button>
  </div>

  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button id="btnVat" title="VAT(부가세) 제외 기준으로 보기 — 매출/목표/객단가/생산성 모두 ÷1.1. 달성률·전년비는 동일"
      style="border:1px solid #CBD5E1;background:#fff;color:#475569;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px">
      <span id="vatLabel">VAT 제외</span>
    </button>
    <button id="btnExcel" title="현재 기간/매장 기준 엑셀 다운로드"
      style="border:1px solid #10B981;background:#10B981;color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px">
      <span>⬇</span><span>엑셀</span>
    </button>
  </div>
</div>

<div class="main" id="main">
  <!-- 렌더링 후 채워짐 -->
</div>

const toStr = d => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
};
const today = () => { const d=new Date(); return toStr(d); };
const addDays = (s,n) => {
  const [y,m,d] = s.split('-').map(Number);
  return toStr(new Date(y, m-1, d+n));
};
const subYear = s => { const d=new Date(s); d.setFullYear(d.getFullYear()-1); return toStr(d); };

function presetDates(p) {
  const now = new Date();
  const t = toStr(now);
  if (p==='yesterday') { const y=addDays(t,-1); return [y,y]; }
  if (p==='week') {
    const d=new Date(now); d.setDate(d.getDate()-((d.getDay()+6)%7));
    return [toStr(d), t];
  }
  if (p==='mtd')       return [t.slice(0,7)+'-01', t];
  if (p==='last_month'){
    const d=new Date(now.getFullYear(), now.getMonth()-1, 1);
    const e=new Date(now.getFullYear(), now.getMonth(), 0);
    return [toStr(d), toStr(e)];
  }
  if (p==='this_year') return [now.getFullYear()+'-01-01', t];
  if (p==='last_year'){
    const y=now.getFullYear()-1;
    return [y+'-01-01', y+'-12-31'];
  }
  if (p==='30d')       return [addDays(t,-29), t];
  return [t.slice(0,7)+'-01', t];
}

  const res = {};
  STORES.forEach(s => res[s] = []);
  // 문자열 기반 월 순회 (타임존 버그 방지)
  let ym = start.slice(0,7);
  const endM = end.slice(0,7);
  while (ym <= endM) {
    const md = ALL_DATA[ym];
    if (md) {
      STORES.forEach(s => {
        (md[s]||[]).forEach(d => {
          if (d.date >= start && d.date <= end) res[s].push(d);
        });
      });
    }
    const [y, m] = ym.split('-').map(Number);
    ym = m === 12
      ? (y+1) + '-01'
      : y + '-' + String(m+1).padStart(2,'0');
  }
  return res;
}

// 활성 매장만
function activeData(rangeData) {
  const res = {};
  STORES.filter(s=>activeStores.has(s)).forEach(s => res[s] = rangeData[s]||[]);
  return res;
}

// 합계
function sum(data, field) {
  return Object.values(data).flat().reduce((a,d)=>a+(d[field]||0),0);
}

function storeSum(data, s, field) {
  return (data[s]||[]).reduce((a,d)=>a+(d[field]||0),0);
}

// 날짜 범위에 포함된 월들의 전체 월 목표 (날짜 필터 없이 월 전체 합산)
function getMonthlyTargets(start, end) {
  const res = {};
  STORES.forEach(s => res[s] = 0);
  let ym = start.slice(0,7);
  const endM = end.slice(0,7);
  while (ym <= endM) {
    const md = ALL_DATA[ym];
    if (md) STORES.forEach(s => (md[s]||[]).forEach(d => res[s] += (d.target||0)));
    const [y, m] = ym.split('-').map(Number);
    ym = m === 12 ? (y+1)+'-01' : y+'-'+String(m+1).padStart(2,'0');
  }
  return res;
}

// 목표 기준: 월 전체(월말까지) 목표 고정 — KPI·매장별 표 모두 동일 기준

// 선택 범위 [start,end]가 (한 개 이상의) 달 전체를 정확히 덮는지
function isFullMonthRange(start, end){
  if (start.slice(8) !== '01') return false;
  const [ey, em] = end.split('-').map(Number);
  return +end.slice(8) === new Date(ey, em, 0).getDate();
}

// 한 매장의 선택 범위 내 목표/실매출 일자 정합성
//   rows = ad[s] (이미 선택 범위로 필터된 해당 매장 행들)
function targetCoverage(rows, fullMonth, store){
  const td = today();
  // 동탄은 데이터가 1일 늦게 들어옴 → 최근 2일은 '실매출 누락' 판정에서 제외
  const cutoff = (store === '동탄') ? addDays(td, -2) : td;
  let salesDays=0, targetDays=0, salesNoTarget=0, pastTargetNoSales=0;
  const rangeTarget = (rows||[]).reduce((a,d)=>a+(d.target||0),0);
  (rows||[]).forEach(d=>{
    const hasS = d.sales!=null, hasT = d.target!=null;
    if (hasS) salesDays++;
    if (hasT) targetDays++;
    if (hasS && !hasT) salesNoTarget++;          // 실매출 있는데 목표 없음 → 달성률 과대
    if (hasT && !hasS && d.date < cutoff) pastTargetNoSales++; // 지난 날(딜레이 여유 제외) 실매출 누락 의심
  });
  // 경고: 목표/실매출 일자 자체가 어긋날 때만 (부분기간 표시는 별도 안내)
  const mismatch = salesNoTarget>0 || pastTargetNoSales>0;
  let title = '';
  if (salesNoTarget>0)     title += `실매출 ${salesNoTarget}일에 목표 없음(달성률 과대) `;
  if (pastTargetNoSales>0) title += `목표는 있으나 실매출 누락 ${pastTargetNoSales}일 `;
  return { salesDays, targetDays, salesNoTarget, pastTargetNoSales, rangeTarget, mismatch, title: title.trim() };
}

// 날짜 목록
function dates(data) {
  const s = new Set();
  Object.values(data).flat().forEach(d => s.add(d.date));
  return [...s].sort();
}

// ── 숫자 포맷 ────────────────────────────────────────────────────────────────
// 숫자 포맷 — 한국어 단위
const _fmt = (n, unit) => {
  const v = Math.floor(n * 10) / 10;
  return (v % 1 === 0 ? v.toLocaleString() : v.toFixed(1)) + unit;
};
const kor  = n => { // 억/만/원 자동, 소수점1자리 버림
  if (n==null) return '-';
  const abs = Math.abs(n);
  if (abs >= 1e8) return _fmt(n/1e7/10, '억');
  if (abs >= 1e4) return _fmt(n/1000/10, '만');
  return n.toLocaleString()+'원';
};
const korW = n => n==null?'-':_fmt(n/1000/10, '만원');
const w    = n => { if(n==null) return '-'; return Math.abs(n)>=1e8 ? _fmt(n/1e8,'억') : _fmt(n/1e4,'만'); };
const n0   = n => n==null?'-':Math.round(n).toLocaleString();
const pct  = (a,b) => (b&&b>0) ? Math.floor(a/b*1000)/10 : null;
const pctSign = n => n==null?'-':(n>=0?'▲':'▼')+(Math.floor(Math.abs(n)*10)/10).toFixed(1)+'%';
const calcProductivity = entries => {
  const v = entries.filter(d=>d.staff&&d.staff>0&&d.sales!=null);
  if (!v.length) return null;
  const s = v.reduce((a,d)=>a+d.sales,0), t = v.reduce((a,d)=>a+d.staff,0);
  return t>0 ? Math.floor(s/t) : null;
};

function downloadExcel() {
  const wb = XLSX.utils.book_new();

  stores.forEach(s => {
    const entries = rangeData[s] || [];
    const days = entries.filter(e => (e.sales||0) > 0).length;
    const sales = entries.reduce((a,e)=>a+(e.sales||0),0);
    const rec   = entries.reduce((a,e)=>a+(e.receipts||0),0);
    const sgated = entries.reduce((a,e)=>a+((e.receipts||0)>0?(e.sales||0):0),0);
    const target = entries.reduce((a,e)=>a+(e.target||0),0);
    const per = rec>0 ? Math.floor(sgated/rec) : 0;
    const ach = target>0 ? +(sales/target*100).toFixed(1) : null;
    sumRows.push([s, days, sales, rec, per, target, ach]);
  });
  const wsSum = XLSX.utils.aoa_to_sheet(sumRows);
  wsSum['!cols'] = [{wch:8},{wch:10},{wch:14},{wch:12},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsSum, '합계');

  // 매장별 일자 시트
  stores.forEach(s => {
    const entries = (rangeData[s] || []).slice().sort((a,b)=>a.date.localeCompare(b.date));
    const rows = [['날짜','요일','매출','영수','객단가','목표','직원','생산량']];
    entries.forEach(e => {
      const dt = new Date(e.date+'T00:00:00');
      rows.push([
        e.date, DOW2[dt.getDay()],
        e.sales ?? null, e.receipts ?? null, e.per_receipt ?? null,
        e.target ?? null, e.staff ?? null, e.productivity ?? null
      ]);

    ws['!cols'] = [{wch:12},{wch:6},{wch:12},{wch:10},{wch:10},{wch:12},{wch:8},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws, s);
  });

  const fname = `데모커피_운영_${fpStart}_${fpEnd}.xlsx`;
  XLSX.writeFile(wb, fname);
}

// ── 1. 페이스 카드 ────────────────────────────────────────────────────────────
function renderPace(ad, yad, start, end, stores, monthlyTargets) {
  const totalSales   = sum(ad,'sales');
  const fullMonth    = isFullMonthRange(start, end);
  const totalTarget  = Object.values(monthlyTargets).reduce((a,v)=>a+v,0);
  // 목표/실매출 일자 불일치 매장 안내
  const badStores = stores.filter(s => targetCoverage(ad[s]||[], fullMonth, s).mismatch);
  const targetNote = !fullMonth ? ' <span class="range-note">(월 전체)</span>' : '';
  const targetFlag = badStores.length
    ? ` <span class="warn-flag" title="목표/실매출 일자 불일치: ${badStores.map(s=>s+'점').join(', ')} — 매장별 실적 표 ⚠ 참고">⚠</span>`
    : '';
  const totalReceipts= sum(ad,'receipts');

  const salesDays = [...new Set(Object.values(ad).flat().filter(d=>d.sales!=null).map(d=>d.date))].length;
  const ySales    = sum(yad,'sales');

  const achRate  = pct(totalSales, totalTarget);
  const yoyDelta = ySales>0 ? (totalSales-ySales)/ySales*100 : null;

  // 이번 달 페이스 (MTD 선택 시)
  const todayStr = today();
  const isMtd = start.slice(0,7) === todayStr.slice(0,7) && start === start.slice(0,7)+'-01';
  let paceHtml = '';
  if (isMtd) {
    const yr = +start.slice(0,4), mo = +start.slice(5,7);
    const daysInMonth = new Date(yr, mo, 0).getDate();
    const elapsed = salesDays || 1;

    // 평일/주말 분리 일평균
    const dateSalesMap = {};
    Object.values(ad).flat().forEach(r => {
      if (r.sales != null) dateSalesMap[r.date] = (dateSalesMap[r.date]||0) + r.sales;
    });
    const wdSales = [], weSales = [];
    Object.entries(dateSalesMap).forEach(([dt, s]) => {
      const dow = new Date(dt+'T00:00:00').getDay();
      if (dow===0||dow===6||HOLIDAYS.has(dt)) weSales.push(s);
      else wdSales.push(s);
    });
    const wdAvg = wdSales.length ? wdSales.reduce((a,v)=>a+v,0)/wdSales.length : 0;
    const weAvg = weSales.length ? weSales.reduce((a,v)=>a+v,0)/weSales.length : 0;

    // 잔여 평일/주말 카운트
    let remWd = 0, remWe = 0;
    for (let d = elapsed+1; d <= daysInMonth; d++) {
      const dt = yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const dow = new Date(dt+'T00:00:00').getDay();
      if (dow===0||dow===6||HOLIDAYS.has(dt)) remWe++; else remWd++;
    }
    const projected = Math.floor(totalSales + wdAvg * remWd + weAvg * remWe);
    const remaining = daysInMonth - elapsed;

    paceHtml = `<div class="pace-item">
      <div class="lbl">월말 예상</div>
      <div class="val" style="font-size:20px">${kor(projected)}</div>
      <div class="sub">잔여 ${remaining}일 (평일${remWd}/주말${remWe}) · 평 ${w(wdAvg)} 휴 ${w(weAvg)}</div>
    </div>`;
  }

  const fillColor = achRate==null?'#94A3B8':achRate>=100?'#10B981':achRate>=85?'#F59E0B':'#EF4444';

  // 전년 동기 메트릭
  const yReceipts  = sum(yad,'receipts');
  const yTarget    = sum(yad,'target');
  const yAchRate   = pct(ySales, yTarget);
  // 객단가: 영수 있는 일자의 매출만 합산해서 나눔 (동탄처럼 시트 매출 + OKPOS 영수 누락 케이스 보정)
  const salesGated  = Object.values(ad).flat().reduce((a,d)=>a+((d.receipts||0)>0?(d.sales||0):0),0);
  const ySalesGated = Object.values(yad).flat().reduce((a,d)=>a+((d.receipts||0)>0?(d.sales||0):0),0);
  const perRec     = totalReceipts>0 ? Math.floor(salesGated/totalReceipts) : null;
  const yPerRec    = yReceipts>0    ? Math.floor(ySalesGated/yReceipts)    : null;

  // 전년 대비 (양수=증가)
  const yoySales    = ySales>0     ? (totalSales-ySales)/ySales*100         : null;
  const yoyReceipts = yReceipts>0  ? (totalReceipts-yReceipts)/yReceipts*100: null;
  const yoyPerRec   = (perRec!=null && yPerRec!=null && yPerRec>0)
                       ? (perRec-yPerRec)/yPerRec*100 : null;
  const yoyAch      = (achRate!=null && yAchRate!=null) ? (achRate-yAchRate) : null; // 포인트 차

  const yoyHtml = (val, suffix) => val==null
    ? '<div class="sub" style="color:#94A3B8">전년 -</div>'
    : `<div class="sub" style="color:${val>=0?'#10B981':'#EF4444'};font-weight:700">
         ${val>=0?'▲':'▼'}${Math.abs(val).toFixed(1)}${suffix}
       </div>`;

  document.getElementById('sec-pace').innerHTML = `
    <div class="pace-card">
      <div class="pace-item">
        <div class="lbl">목표 달성률</div>
        <div class="val" style="color:${fillColor}">${achRate!=null?achRate+'%':'-'}${targetFlag}</div>
        <div class="sub">목표 ${kor(totalTarget)}${targetNote}</div>
        ${yoyHtml(yoyAch, 'p')}
        <div class="progress"><div class="progress-fill" style="width:${Math.min(achRate||0,100)}%;background:${fillColor}"></div></div>
        <div class="sub" style="color:#94A3B8;font-size:10px;margin-top:4px">목표 산정: P&amp;L 월 목표(부가세 포함 환산)를 전년 동월 평일/주말 비율로 일자별 배분 · 세종은 지역 이벤트 수요 반영</div>
      </div>
      <div class="pace-item">
        <div class="lbl">실매출</div>
        <div class="val">${kor(totalSales)}</div>
        <div class="sub">전년 ${kor(ySales)}</div>
        ${yoyHtml(yoySales, '%')}
      </div>
      <div class="pace-item">
        <div class="lbl">객단가</div>
        <div class="val">${perRec!=null?perRec.toLocaleString()+'원':'-'}</div>
        <div class="sub">전년 ${yPerRec!=null?yPerRec.toLocaleString()+'원':'-'}</div>
        ${yoyHtml(yoyPerRec, '%')}
      </div>
      <div class="pace-item">
        <div class="lbl">영수건수</div>
        <div class="val">${n0(totalReceipts)}</div>
        <div class="sub">전년 ${n0(yReceipts)}</div>
        ${yoyHtml(yoyReceipts, '%')}
      </div>
      ${paceHtml}
    </div>
  `;
  if (isMtd) {
    // 5열로 조정
    document.querySelector('.pace-card').style.gridTemplateColumns='1fr 1fr 1fr 1fr 1fr';
  }
}

// ── 2. 순위 테이블 ────────────────────────────────────────────────────────────
function renderRank(ad, yad, stores, monthlyTargets) {
  const el = document.getElementById('sec-rank');
  const fullMonth = isFullMonthRange(fpStart, fpEnd);
  const modeLabel = '월 전체 목표';

  const rows = stores.map(s => {
    const sales     = storeSum(ad, s, 'sales');
    const cov       = targetCoverage(ad[s]||[], fullMonth, s);
    const target    = monthlyTargets[s] || 0;
    const receipts  = storeSum(ad, s, 'receipts');
    const ySales    = storeSum(yad, s, 'sales');
    const yReceipts = storeSum(yad, s, 'receipts');
    const prod   = calcProductivity(ad[s]||[]);
    const perRec = receipts>0 ? Math.floor(sales/receipts) : null;
    const achR      = pct(sales, target);
    const yoyPct    = ySales>0 ? (sales-ySales)/ySales*100 : null;
    return { s, sales, target, receipts, ySales, yReceipts, prod, perRec, achR, yoyPct, cov };
  }).sort((a,b)=>b.sales-a.sales);

  const tbody = rows.map((r,i)=>{
    const achClass = r.achR==null?'':r.achR>=100?'ach-g':r.achR>=85?'ach-y':'ach-r';
    const ySign    = r.yoyPct==null?'':r.yoyPct>=0?'delta up':'delta dn';
    const noSales  = r.sales===0;
    const flag     = r.cov.mismatch ? `<span class="warn-flag" title="${r.cov.title} — 달성률 참고용">⚠</span>` : '';
    return `<tr style="${noSales?'opacity:.4':''}">
      <td>${i+1}</td>
      <td><span class="store-dot" style="background:${COLORS[r.s]}"></span>${r.s}점</td>
      <td>${w(r.target)}${flag}</td>
      <td>${r.achR!=null?'<div class="ach-wrap"><div class="ach-bar"><div class="ach-fill '+achClass+'" style="width:'+Math.min(Math.max(r.achR,0),100)+'%"></div></div><span class="ach-chip '+achClass+'">'+r.achR+'%</span>'+flag+'</div>':'-'}</td>
      <td>${w(r.sales)}${r.yoyPct!=null?'<span class="'+ySign+'">'+pctSign(r.yoyPct)+'</span>':''}</td>
      <td>${n0(r.receipts)}</td>
      <td>${r.perRec?r.perRec.toLocaleString()+'원':'-'}</td>
      <td>${r.prod?_fmt(r.prod/1e4,'만원'):'-'}</td>
    </tr>`;
  }).join('');

  // ── 페어 비교 행 (정확히 2매장일 때) ──
  let pairRow = '';
  if (rows.length === 2) {
    const [a, b] = rows;
    const dCls = v => v>0?'delta up':(v<0?'delta dn':'');
    const sgn  = v => v>0?'+':(v<0?'-':'');
    const dW   = v => v===0?'-':sgn(v)+w(Math.abs(v));
    const dN0  = v => v===0?'-':sgn(v)+n0(Math.abs(v));
    const dWon = v => v===0?'-':sgn(v)+Math.abs(v).toLocaleString()+'원';
    const dSales    = a.sales - b.sales;
    const dRec      = a.receipts - b.receipts;
    const dPerRec   = (a.perRec||0) - (b.perRec||0);
    const dProd     = (a.prod||0) - (b.prod||0);
    const dAch      = (a.achR!=null && b.achR!=null) ? (a.achR - b.achR) : null;
    pairRow = `<tr style="background:#FEF3C7;border-top:2px solid #F59E0B;font-weight:600">
      <td colspan="2" style="color:#92400E">차이 (${a.s} − ${b.s})</td>
      <td style="color:#94A3B8">-</td>
      <td>${dAch!=null?'<span class="'+dCls(dAch)+'">'+sgn(dAch)+Math.abs(dAch)+'%p</span>':'-'}</td>
      <td><span class="${dCls(dSales)}">${dW(dSales)}</span></td>
      <td><span class="${dCls(dRec)}">${dN0(dRec)}</span></td>
      <td><span class="${dCls(dPerRec)}">${dWon(dPerRec)}</span></td>
      <td><span class="${dCls(dProd)}">${dProd===0?'-':sgn(dProd)+_fmt(Math.abs(dProd)/1e4,'만원')}</span></td>
    </tr>`;
  }

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <div class="card-title" style="margin:0">매장별 실적
        ${rows.length===2 ? '<span class="range-note" style="color:#92400E">· 페어 비교 모드</span>' : ''}
        ${!fullMonth ? '<span class="range-note">· 부분 기간 ('+modeLabel+')</span>' : ''}
      </div>
    </div>
    <table class="rank-table">
      <thead><tr>
        <th>#</th><th>매장</th><th>목표</th><th>달성%</th><th>실매출</th>
        <th>영수</th><th>객단가</th><th>인당생산량</th>
      </tr></thead>
      <tbody>${tbody}${pairRow}</tbody>
    </table>`;
}

// ── 4. 일별 트렌드 라인차트 ───────────────────────────────────────────────────
let lineAgg = 'auto';  // 일별 트렌드 차트 집계단위 수동선택 (auto/day/week/month) — 헤더 드롭다운
function renderLine(start, end, ad, yad, stores) {
  dc('line');
  const el = document.getElementById('sec-line');
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div class="card-title" style="margin:0">일별 실매출 · 영수건수</div>
      <div style="display:flex;align-items:center;gap:12px">
        <select id="lineAggSel" title="집계 단위 직접 선택 (자동=선택 기간에 맞춰 자동)" style="font-size:11px;padding:3px 7px;border:1px solid #E2E8F0;border-radius:6px;background:#fff;color:#334155;cursor:pointer">
          <option value="auto">자동(기간맞춤)</option>
          <option value="day">일자별</option>
          <option value="week">주별</option>
          <option value="month">월별</option>
        </select>
        <div class="chart-legend">
          <div class="cl-item"><div class="cl-line" style="background:#3B82F6"></div>실매출</div>
          <div class="cl-item"><div class="cl-line" style="background:#F59E0B"></div>영수건수</div>
          <div class="cl-item"><div class="cl-dashed"></div>전년</div>
        </div>
      </div>
    </div>
    <div class="chart-wrap h240"><canvas id="lineCanvas"></canvas></div>
  `;

  const aggSel = el.querySelector('#lineAggSel');
  if (aggSel) { aggSel.value = lineAgg; aggSel.onchange = () => { lineAgg = aggSel.value; render(); }; }

  // 날짜별 합산
  const dList = dates(ad);
  const yDList= dates(yad);

  const sumByDate=(data,field,dts)=>dts.map(dt=>{
    const v=stores.reduce((a,s)=>{const r=(data[s]||[]).find(d=>d.date===dt);return a+(r&&r[field]!=null?r[field]:0)},0);
    return v>0?v:null;
  });

  // YoY 날짜 대응: yDList와 dList는 같은 순서 (1년 차이)
  const yoyLabels = dList; // x축은 현재 날짜
  const yoySales  = yDList.map(yd=>{
    const v=stores.reduce((a,s)=>{const r=(yad[s]||[]).find(d=>d.date===yd);return a+(r&&r.sales!=null?r.sales:0)},0);
    return v>0?Math.floor(v/1e4*10)/10:null;
  });
  const yoyRec = yDList.map(yd=>{
    const v=stores.reduce((a,s)=>{const r=(yad[s]||[]).find(d=>d.date===yd);return a+(r&&r.receipts!=null?r.receipts:0)},0);
    return v>0?v:null;
  });

  const curSalesRaw   = sumByDate(ad,'sales',dList);
  const curReceiptsRaw= sumByDate(ad,'receipts',dList);
  const yoySalesRaw   = yDList.map(yd=>{
    const v=stores.reduce((a,s)=>{const r=(yad[s]||[]).find(d=>d.date===yd);return a+(r&&r.sales!=null?r.sales:0)},0);
    return v>0?v:null;
  });
  const yoyRecRaw = yDList.map(yd=>{
    const v=stores.reduce((a,s)=>{const r=(yad[s]||[]).find(d=>d.date===yd);return a+(r&&r.receipts!=null?r.receipts:0)},0);
    return v>0?v:null;
  });

  // ── 집계 단위: 드롭다운 수동선택(lineAgg) 우선, '자동'이면 기간 길이로 (≤90d 일별, 91~180d 주별, >180d 월별) ──
  const autoMode = dList.length > 180 ? 'month' : dList.length > 90 ? 'week' : 'day';
  const aggMode = (lineAgg && lineAgg !== 'auto') ? lineAgg : autoMode;
  function bucketize(mode){
    if (mode==='day') return {
      labels: dList.map(d=>d.slice(5)),
      cs: curSalesRaw, cr: curReceiptsRaw, ys: yoySalesRaw, yr: yoyRecRaw,
      keyDates: dList,
    };
    const buckets = {};
    dList.forEach((dt,i)=>{
      const d=new Date(dt);
      let key;
      if (mode==='week') {
        const day=(d.getDay()+6)%7;
        const mon=new Date(d); mon.setDate(d.getDate()-day);
        key=toStr(mon);
      } else { key=dt.slice(0,7); }
      if(!buckets[key]) buckets[key]={cs:0,cr:0,ys:0,yr:0,n:0};
      buckets[key].cs += curSalesRaw[i]||0;
      buckets[key].cr += curReceiptsRaw[i]||0;
      buckets[key].ys += yoySalesRaw[i]||0;
      buckets[key].yr += yoyRecRaw[i]||0;
      buckets[key].n  += 1;
    });
    const keys = Object.keys(buckets).sort();
    return {
      labels: keys.map(k=> mode==='week' ? k.slice(5)+'주' : k.slice(2)),
      cs: keys.map(k=>buckets[k].cs||null),
      cr: keys.map(k=>buckets[k].cr||null),
      ys: keys.map(k=>buckets[k].ys||null),
      yr: keys.map(k=>buckets[k].yr||null),
      keyDates: keys,
    };
  }
  const agg = bucketize(aggMode);
  const curSales    = agg.cs.map(v=>v?Math.floor(v/1e4*10)/10:null);
  const curReceipts = agg.cr;
  const yoyAggSales = agg.ys.map(v=>v?Math.floor(v/1e4*10)/10:null);
  const yoyAggRec   = agg.yr;

  // 카드 제목 업데이트
  const titleEl = el.querySelector('.card-title');
  if (titleEl) {
    const unitLabel = aggMode==='month'?'월별':aggMode==='week'?'주별':'일별';
    titleEl.textContent = unitLabel + ' 실매출 · 영수건수';
  }

  const ctx = document.getElementById('lineCanvas').getContext('2d');
  charts.line = new Chart(ctx,{
    type:'line',
    data:{
      labels: agg.labels,
      datasets:[
        { label:'실매출', data:curSales, borderColor:'#3B82F6', backgroundColor:'#3B82F620', borderWidth:2, pointRadius:3, tension:.3, yAxisID:'y', spanGaps:false },
        { label:'전년매출', data:yoyAggSales, borderColor:'#3B82F660', borderDash:[5,4], borderWidth:1.5, pointRadius:2, tension:.3, yAxisID:'y', spanGaps:false },
        { label:'영수건수', data:curReceipts, borderColor:'#F59E0B', backgroundColor:'#F59E0B20', borderWidth:2, pointRadius:3, tension:.3, yAxisID:'y1', spanGaps:false },
        { label:'전년영수', data:yoyAggRec, borderColor:'#F59E0B60', borderDash:[5,4], borderWidth:1.5, pointRadius:2, tension:.3, yAxisID:'y1', spanGaps:false },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false}, tooltip:{callbacks:{
        label:c=>{
          if(c.dataset.label.includes('매출')) return c.dataset.label+': '+(c.raw!=null?c.raw.toLocaleString()+'만':'-');
          return c.dataset.label+': '+(c.raw!=null?c.raw.toLocaleString()+'건':'-');
        }
      }}},
      scales:{
        x:{ ticks:{font:{size:10},maxRotation:0,color:ctx2=>{
          if(aggMode!=='day') return '#64748B';
          const dt=agg.keyDates[ctx2.index];
          if(!dt) return '#64748B';
          const d=new Date(dt), dow=d.getDay();
          return (dow===0||dow===6||HOLIDAYS.has(dt))?'#EF4444':'#64748B';
        }}, grid:{color:'#F1F5F9'} },
        y:{ position:'left', ticks:{font:{size:10},callback:v=>v+'만'}, grid:{color:'#F1F5F9'} },
        y1:{ position:'right', ticks:{font:{size:10},callback:v=>v+'건'}, grid:{display:false} }
      }
    },
    plugins:[{
      id:'wkndBg',
      beforeDraw(chart){
        if (aggMode!=='day') return;
        const {ctx:c,chartArea:{left,right,top,bottom},scales:{x}}=chart;
        agg.keyDates.forEach((dt,i)=>{
          const d=new Date(dt),dow=d.getDay();
          const isHoliday=HOLIDAYS.has(dt);
          const isWknd=dow===0||dow===6;
          if(!isWknd&&!isHoliday) return;
          const xPos=x.getPixelForValue(i);
          const half=(x.getPixelForValue(1)-x.getPixelForValue(0))/2;
          c.save();
          c.fillStyle=isHoliday&&!isWknd?'#FEF3C720':'#FEE2E230';
          c.fillRect(xPos-half,top,half*2,bottom-top);
          c.restore();
        });
      }
    }]
  });
}

// ── 7. 일자별 매장 상세 테이블 ──────────────────────────────────────────────
let _dtState = { mode:'both', heatmap:true, hidden:new Set() };
let _dtCache = null;

function _setDtMode(m) { _dtState.mode = m; _drawDailyTable(); }
function _toggleDtHeat() { _dtState.heatmap = !_dtState.heatmap; _drawDailyTable(); }
function _toggleDtStore(s) {
  if (_dtState.hidden.has(s)) _dtState.hidden.delete(s);
  else _dtState.hidden.add(s);
  _drawDailyTable();
}

function renderDailyTable(ad, yad, stores) {
  _dtCache = { ad, yad, stores };
  _drawDailyTable();
}

function _drawDailyTable() {
  if (!_dtCache) return;
  const { ad, yad, stores } = _dtCache;
  const el = document.getElementById('sec-daily');
  const allDates = dates(ad);
  if (!allDates.length) { el.innerHTML = '<div class="card-title">일자별 매장 데이터</div><div style="color:#94A3B8;padding:12px">데이터 없음</div>'; return; }

  const showSales = _dtState.mode !== 'rec';
  const showRec   = _dtState.mode !== 'sales';
  const colsPerStore = (showSales?1:0) + (showRec?1:0);
  const visibleStores = stores.filter(s => !_dtState.hidden.has(s));

  // 매장별 매출 max (히트맵 정규화용)
  const maxSales = {};
  stores.forEach(s => {
    maxSales[s] = Math.max(0, ...(ad[s]||[]).map(d=>d.sales||0));
  });

  // 합계행
  const totSales    = visibleStores.reduce((a,s)=>a+storeSum(ad,s,'sales'),0);
  const totReceipts = visibleStores.reduce((a,s)=>a+storeSum(ad,s,'receipts'),0);

  // 컨트롤 줄
  const modeBtn = (m, lbl) => `<button class="dt-mode-btn ${_dtState.mode===m?'active':''}" onclick="_setDtMode('${m}')">${lbl}</button>`;
  const chip = s => `<span class="dt-store-chip ${_dtState.hidden.has(s)?'off':''}" style="color:${_dtState.hidden.has(s)?'':COLORS[s]};border-color:${_dtState.hidden.has(s)?'':COLORS[s]+'66'}" onclick="_toggleDtStore('${s}')">${s}</span>`;
  const ctrl = `
    <div class="dt-ctrl">
      <span class="dt-ctrl-label">표시</span>
      ${modeBtn('both','매출+영수')}${modeBtn('sales','매출만')}${modeBtn('rec','영수만')}
      <span class="dt-ctrl-label" style="margin-left:8px">히트맵</span>
      <button class="dt-heat-btn ${_dtState.heatmap?'on':''}" onclick="_toggleDtHeat()">${_dtState.heatmap?'ON':'OFF'}</button>
      <div class="dt-store-chips">${stores.map(chip).join('')}</div>
    </div>`;

  // 헤더
  let th = '<th class="dt-th">날짜</th><th class="dt-th">요일</th>';
  visibleStores.forEach(s => { th += `<th class="dt-th" colspan="${colsPerStore}" style="color:${COLORS[s]}" onclick="_toggleDtStore('${s}')" title="클릭해서 숨김">${s}</th>`; });
  th += `<th class="dt-th" colspan="${colsPerStore}">합계</th>`;

  let subTh = '<th></th><th></th>';
  const subCols = (showSales?'<th class="dt-sub">매출</th>':'') + (showRec?'<th class="dt-sub">영수</th>':'');
  visibleStores.forEach(() => { subTh += subCols; });
  subTh += subCols;

  // 데이터 행
  let rows = '';
  allDates.forEach(dt => {
    const dow = DOW[new Date(dt).getDay()];
    const isWknd = new Date(dt).getDay()===0||new Date(dt).getDay()===6;
    let daySales = 0, dayRec = 0;
    let cells = '';
    visibleStores.forEach(s => {
      const r = (ad[s]||[]).find(d=>d.date===dt);
      const sv = r&&r.sales!=null ? r.sales : null;
      const rv = r&&r.receipts!=null ? r.receipts : null;
      if (sv!=null) daySales+=sv;
      if (rv!=null) dayRec+=rv;
      const heat = _dtState.heatmap && sv!=null && maxSales[s]>0
        ? `background:rgba(14,165,233,${(sv/maxSales[s]*0.28).toFixed(3)})`
        : '';
      if (showSales) cells += `<td class="dt-td" style="${heat}">${sv!=null?w(sv):'-'}</td>`;
      if (showRec)   cells += `<td class="dt-td">${rv!=null?n0(rv):'-'}</td>`;
    });
    rows += `<tr class="${isWknd?'dt-wknd':''}">
      <td class="dt-date">${dt.slice(5)}</td>
      <td class="dt-dow">${dow}</td>
      ${cells}
      ${showSales?`<td class="dt-td dt-sum">${daySales>0?w(daySales):'-'}</td>`:''}
      ${showRec?`<td class="dt-td dt-sum">${dayRec>0?n0(dayRec):'-'}</td>`:''}
    </tr>`;
  });

  // 합계행
  let sumCells = '';
  visibleStores.forEach(s => {
    const sv = storeSum(ad,s,'sales');
    const rv = storeSum(ad,s,'receipts');
    if (showSales) sumCells += `<td class="dt-td dt-total">${sv>0?w(sv):'-'}</td>`;
    if (showRec)   sumCells += `<td class="dt-td dt-total">${rv>0?n0(rv):'-'}</td>`;
  });

  el.innerHTML = `
    <div class="card-title">일자별 매장 데이터</div>
    ${ctrl}
    <div class="dt-scroll">
      <table class="dt-table">
        <thead>
          <tr>${th}</tr>
          <tr>${subTh}</tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td class="dt-date dt-total" colspan="2">합계</td>
            ${sumCells}
            ${showSales?`<td class="dt-td dt-total">${totSales>0?w(totSales):'-'}</td>`:''}
            ${showRec?`<td class="dt-td dt-total">${totReceipts>0?n0(totReceipts):'-'}</td>`:''}
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}


// ── postMessage 동기화 (부모 셸과 통신) ──
function _opsApplySync(p) {
  try {
    if (!p) return;
    if (p.period && p.period.start && typeof fpStart !== 'undefined') {
      fpStart = p.period.start; fpEnd = p.period.end;
      if (typeof picker !== 'undefined' && picker.setDateRange) {
        picker.setDateRange(p.period.start, p.period.end);
      }
      if (typeof curPreset !== 'undefined') curPreset = p.period.preset || '';
    }
    if (Array.isArray(p.stores) && typeof activeStores !== 'undefined') {
      activeStores.clear();
      p.stores.forEach(s => activeStores.add(s));
      if (typeof updateAllBtn === 'function') updateAllBtn();
      document.querySelectorAll('.pill[data-store]').forEach(el => {
        if (activeStores.has(el.dataset.store)) {
          el.classList.add('on');
          el.style.background = (typeof COLORS !== 'undefined' && COLORS[el.dataset.store]) ? COLORS[el.dataset.store] + '22' : '';
        } else {
          el.classList.remove('on');
          el.style.background = '';
        }
      });
    }
    if (typeof render === 'function') render();
  } catch (e) { console.warn('[ops applySync]', e); }
}
window.addEventListener('message', (e) => {
  const m = e.data;
  if (!m || m.type !== 'inkc:sync') return;
  _opsApplySync(m.payload);
  try { window.parent.postMessage({ type: 'inkc:synced', tab: 'ops' }, '*'); } catch (_) {}
});
// 부모에게 준비 완료 알림
if (window.parent !== window) {
  try { window.parent.postMessage({ type: 'inkc:ready', tab: 'ops' }, '*'); } catch (_) {}
}

// ── 초기 실행 ────────────────────────────────────────────────────────────────
render();

// ── 실시간 오버레이 (오늘 매출/영수 1분 자동갱신) ────────────────────────────
// 통합본(ink-korea)에서는 /api/ops-live 가 OKPOS·TOSS 실시간을 내려줌.
// 옛 github.io(함수 없음)에선 fetch 실패 → 정적 데이터 그대로(무해).
async function _opsLiveRefresh() {
  try {
    const res = await fetch('/api/ops-live', { cache: 'no-store' });
    if (!res.ok) return;
    const live = await res.json();
    if (!live || !live.date || !live.stores) return;
    const ym = live.date.slice(0, 7);
    var patched = 0;
    for (var i = 0; i < STORES.length; i++) {
      var store = STORES[i];
      var u = live.stores[store];
      if (!u) continue;
      var rawArr = _RAW_ALL_DATA[ym] && _RAW_ALL_DATA[ym][store];
      var curArr = ALL_DATA[ym] && ALL_DATA[ym][store];
      if (!Array.isArray(rawArr) || !Array.isArray(curArr)) continue;
      var rRow = rawArr.find(function (r) { return r && r.date === live.date; });
      var cRow = curArr.find(function (r) { return r && r.date === live.date; });
      if (!rRow || !cRow) continue;
      if (typeof u.sales === 'number') rRow.sales = u.sales;
      rRow.receipts = (u.receipts == null ? null : u.receipts);
      rRow.per_receipt  = (rRow.sales && rRow.receipts) ? Math.floor(rRow.sales / rRow.receipts) : null;
      rRow.productivity = (rRow.sales && rRow.staff)    ? Math.floor(rRow.sales / rRow.staff)    : (rRow.productivity || null);
      cRow.receipts = rRow.receipts;   // 영수는 VAT 무관 → applyVatMode 가 안 건드림, 직접 반영
      patched++;
    }
    if (patched) { applyVatMode(); render(); }
  } catch (e) { /* 실시간 실패는 정적 데이터 유지 */ }
}
setInterval(_opsLiveRefresh, 60000);
_opsLiveRefresh();
</script>
